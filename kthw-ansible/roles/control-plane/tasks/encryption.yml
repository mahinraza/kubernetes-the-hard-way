---
# Run once on the first master, then distribute to all masters.
- name: Generate encryption key
  ansible.builtin.shell: head -c 32 /dev/urandom | base64
  register: encryption_key_result
  run_once: true
  delegate_to: "{{ groups[masters_group][0] }}"
  changed_when: false
  no_log: true

- name: Set encryption key fact across all masters
  ansible.builtin.set_fact:
    encryption_key: "{{ hostvars[groups[masters_group][0]].encryption_key_result.stdout }}"
  no_log: true

- name: Deploy encryption config
  ansible.builtin.template:
    src: encryption-config.yaml.j2
    dest: "{{ dirs.kubernetes }}/encryption-config.yaml"
    owner: root
    group: root
    mode: "0600"