---
- name: Check if ufw is active
  ansible.builtin.command: ufw status
  register: ufw_status
  changed_when: false
  failed_when: false

- name: Allow Kubernetes API port
  community.general.ufw:
    rule: allow
    port: "{{ haproxy.frontend_port }}"
    proto: tcp
    comment: "HAProxy Kubernetes API"
  when: "'active' in ufw_status.stdout"

- name: Allow HAProxy stats port
  community.general.ufw:
    rule: allow
    port: "{{ haproxy.stats_port }}"
    proto: tcp
    comment: "HAProxy Stats"
  when: "'active' in ufw_status.stdout"