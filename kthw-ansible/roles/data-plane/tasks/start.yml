---
- name: Enable and start worker services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - kubelet
    - kube-proxy

- name: Wait for node to register with API server
  ansible.builtin.command: >
    kubectl get node {{ inventory_hostname_short }}
    --kubeconfig {{ dirs.kubernetes_pki }}/{{ inventory_hostname_short }}.kubeconfig
  register: node_registered
  retries: 12
  delay: 5
  until: node_registered.rc == 0
  changed_when: false