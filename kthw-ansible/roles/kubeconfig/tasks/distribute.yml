---
# Component kubeconfigs — each node receives only what belongs to its group
- name: Distribute component kubeconfigs
  ansible.builtin.copy:
    src:   "{{ kubeconfig_local_dir }}/{{ item.value.kubeconfig }}"
    dest:  "{{ item.value.dest }}"
    owner: root
    group: root
    mode:  "0600"
  loop: "{{ kubeconfigs | dict2items }}"
  become: true
  loop_control:
    label: "{{ item.key }} → {{ inventory_hostname_short }}"
  when: inventory_hostname in groups[item.value.hosts_group]

# Kubelet kubeconfigs — each worker receives only its own
- name: Distribute kubelet kubeconfig to workers
  ansible.builtin.copy:
    src:   "{{ kubeconfig_local_dir }}/{{ inventory_hostname_short }}.kubeconfig"
    dest:  "{{ dirs.kubernetes }}/kubelet.kubeconfig"
    owner: root
    group: root
    mode:  "0600"
  when: inventory_hostname in groups['workers']
  become: true