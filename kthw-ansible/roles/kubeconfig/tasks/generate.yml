---
# Runs on localhost once — generates all component kubeconfigs into pki_local_dir
- name: Generate component kubeconfigs on localhost
  ansible.builtin.template:
    src: kubeconfig.j2
    dest: "{{ kubeconfig_local_dir }}/{{ item.value.kubeconfig }}"
    mode: "0600"
  loop: "{{ kubeconfigs | dict2items }}"
  loop_control:
    label: "{{ item.key }}"
  vars:
    kc: "{{ item.value }}"
  delegate_to: localhost
  run_once: true