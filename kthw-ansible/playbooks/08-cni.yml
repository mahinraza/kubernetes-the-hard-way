---
- name: Deploy pod network (Weave CNI)
  hosts: masters
  gather_facts: false
  become: true
  tasks:
    - name: Deploy Weave CNI
      ansible.builtin.command:
        cmd: kubectl apply -f "https://github.com/weaveworks/weave/releases/download/v2.8.1/weave-daemonset-k8s-1.11.yaml"
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.kubeconfig

    - name: Wait for Weave pods to be ready
      ansible.builtin.command:
        cmd: kubectl rollout status daemonset weave-net -n kube-system --timeout=90s
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      environment:
        KUBECONFIG: /etc/kubernetes/admin.kubeconfig

    - name: Verify nodes are Ready
      ansible.builtin.command:
        cmd: kubectl get nodes
      register: node_status
      run_once: true
      delegate_to: "{{ groups['masters'][0] }}"
      changed_when: false
      environment:
        KUBECONFIG: /etc/kubernetes/admin.kubeconfig

    - name: Show node status
      ansible.builtin.debug:
        var: node_status.stdout_lines
      run_once: true